# DotnetDeployer configuration for RetroSharp
# https://github.com/SuperJMN/DotnetDeployer

solution: RetroSharp.sln

packages:
  - name: RetroSharp.Tool
    project: src/RetroSharp.Cli/RetroSharp.Cli.csproj
    type: tool
    description: "A modern C#-like language and zero-cost 2D framework for Game Boy and NES"
    
output:
  directory: packages/
  
nuget:
  source: https://api.nuget.org/v3/index.json
  apiKey:
    from: env
    name: NUGET_API_KEY
  
versioning:
  strategy: gitversion
  
build:
  configuration: Release
  
# Solo empaquetar el CLI como tool, otros proyectos son librerías internas
projects-to-pack:
  - src/RetroSharp.Cli/RetroSharp.Cli.csproj
